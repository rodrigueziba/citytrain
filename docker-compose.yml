version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: train_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: ushuaia_train
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: train_backend
    ports:
      - "3001:3000" # Exponemos Nest en el puerto 3001 para no pisar Next.js
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:rootpassword@db:5432/ushuaia_train?schema=public

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: train_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001

volumes:
  postgres_data:
